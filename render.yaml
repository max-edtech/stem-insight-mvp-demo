services:
  - type: web
    name: construction-budget-demo
    runtime: node
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm run render:start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/dev.db
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
